<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>全画面地図アプリ（Leaflet版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- LeafletのCSSを読み込む -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
    }
    body {
      overflow: hidden;
    }
  </style>
</head>
<body>

    <button onclick="generateRoute()" style="position:absolute; z-index:1000; top:100px; left:10px;">
      ルート生成
    </button>
  
    <div id="map"></div>
  
    <!-- LeafletのJSを読み込む -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
  
  </body>
</html>
