<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>全画面地図アプリ（Leaflet版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- LeafletのCSSを読み込む -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
    }

    #routeButton {
      position: absolute;
      top: 80px;
      left: 10px;
      z-index:1000;
    }

    "radiusInput{
      positioin: absolute;
      top: 120px;
      left: 10px;
      z-index: 1000;
      width: 100px;
    }
  </style>
</head>
<body>
  <button id="routeButton" onclick="generateRoute()">ルート作成</button>
  <input id="radiusInput" type="number" value="3" placeholder="半径(km)" />

  <div id="map"></div>
  
  <!-- LeafletのJSを読み込む -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
